services:
  db:
    image: postgres:16-alpine
    container_name: manahau_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: manahau
      POSTGRES_PASSWORD: manahau_dev
      POSTGRES_DB: manahau
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
